services:
  - type: web
    name: agentrouter-markets
    runtime: docker
    plan: free
    repo: https://github.com/connectwilson/agentrouter-markets
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /agent-router/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: ADN_PROVIDER_RECEIVE_ADDRESS
        value: 0x2c4d600a04c0d3bbb1e3cc8a13e54e21c2b6c0bb
      - key: ADN_PROVIDER_SECRET_PASSPHRASE
        sync: false
      - key: ADN_ARC_RPC_URL
        value: https://rpc.testnet.arc.network
      - key: ADN_ARC_ANCHOR_CONTRACT
        value: 0x65274c73f39bf1654f9aaf261ea16d0b08fdb8d0
      - key: ADN_ARC_ANCHOR_PRIVATE_KEY
        sync: false
  - type: web
    name: agentrouter-markets-sg
    runtime: docker
    region: singapore
    plan: starter
    repo: https://github.com/connectwilson/agentrouter-markets
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /agent-router/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: AGENT_ROUTER_PUBLIC_URL
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: ADN_PROVIDER_RECEIVE_ADDRESS
        value: 0x2c4d600a04c0d3bbb1e3cc8a13e54e21c2b6c0bb
      - key: GITHUB_CLIENT_ID
        sync: false
      - key: GITHUB_CLIENT_SECRET
        sync: false
      - key: ADN_PROVIDER_SECRET_PASSPHRASE
        sync: false
      - key: ADN_ARC_RPC_URL
        value: https://rpc.testnet.arc.network
      - key: ADN_ARC_ANCHOR_CONTRACT
        value: 0x65274c73f39bf1654f9aaf261ea16d0b08fdb8d0
      - key: ADN_ARC_ANCHOR_PRIVATE_KEY
        sync: false
