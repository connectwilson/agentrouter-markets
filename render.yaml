services:
  - type: web
    name: agentrouter-markets
    runtime: docker
    plan: free
    repo: https://github.com/connectwilson/agentrouter-markets
    branch: main
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        sync: false
      - key: ADN_PROVIDER_SECRET_PASSPHRASE
        sync: false
